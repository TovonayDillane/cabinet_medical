{% extends "api/index.html" %}
{% block contenue %}

<div class="login-card">
    <div class="header">
        <div class="logo-box">
            <i data-lucide="stethoscope" stroke-width="2.5"></i>
        </div>
        <h1>Espace Praticien</h1>
        <p>Connectez-vous à votre cabinet médical</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Adresse email</label>
            <div class="input-wrapper">
                <i data-lucide="mail" class="prefix-icon"></i>
                <input type="email" id="email" placeholder="dr.martin@exemple.fr" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-wrapper">
                <i data-lucide="lock" class="prefix-icon"></i>
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="button" class="toggle-pass" id="togglePassword">
                    <i data-lucide="eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div class="form-options">
            <a href="#" class="forgot-link">Oublié ?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span id="btnText">Se connecter</span>
            <div class="loader" id="loader"></div>
            <i data-lucide="arrow-right" id="arrowIcon"></i>
        </button>
    </form>

    <div class="footer">
        <p>Besoin d'assistance ? <a href="#" style="color: var(--primary); text-decoration:none;">Contactez le support</a></p>
    </div>
</div>
{% endblock %}
