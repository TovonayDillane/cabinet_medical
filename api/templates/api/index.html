<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | MedGestion Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --accent: #10b981;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            overflow: hidden;
            padding: 20px;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        .login-card {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp { to { transform: translateY(0); opacity: 1; } }

        .header { text-align: center; margin-bottom: 35px; }

        .logo-box {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .header h1 { font-size: 1.5rem; color: var(--text-main); font-weight: 700; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.prefix-icon { position: absolute; left: 14px; color: var(--text-muted); width: 18px; }
        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }

        .toggle-pass {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .toggle-pass:hover { color: var(--primary); }

        .form-options {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .forgot-link { color: var(--primary); text-decoration: none; font-weight: 600; }
        .forgot-link:hover { text-decoration: underline; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.2);
        }
        .submit-btn:active { transform: translateY(0); }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== MESSAGES STYLING ===== */
        #message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            max-width: 500px;
            width: calc(100% - 40px);
        }

        .messages {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages li {
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.4s ease-out, slideOut 0.4s ease-out 4.6s forwards;
            backdrop-filter: blur(10px);
            border: 1px solid;
            font-size: 0.95rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        .messages li::before {
            content: '⚠';
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* Error messages */
        .messages li.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.05) 100%);
            color: #991b1b;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .messages li.error::before {
            content: '✕';
            color: #dc2626;
        }

        /* Success messages */
        .messages li.success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(22, 163, 74, 0.05) 100%);
            color: #166534;
            border-color: rgba(34, 197, 94, 0.3);
        }

        .messages li.success::before {
            content: '✓';
            color: #22c55e;
        }

        /* Warning messages */
        .messages li.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(217, 119, 6, 0.05) 100%);
            color: #92400e;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .messages li.warning::before {
            content: '!';
            color: #f59e0b;
        }

        /* Info messages */
        .messages li.info {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
            color: #1e40af;
            border-color: rgba(59, 130, 246, 0.3);
        }

        .messages li.info::before {
            content: 'ⓘ';
            color: #3b82f6;
        }

        .messages li.close-btn {
            cursor: pointer;
            margin-left: auto;
            padding: 4px 8px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        .messages li.close-btn:hover {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="contenue">
        {% block contenue %}
        {% endblock %} 
    
    </div>
    
<!-- ty lty mba itedavo toerana ao @front ao fa ty no mandefa message oe mot de passe incorrect -->

    <div id="message">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %} >
                {{ message }}
            </li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>

    <script>
        lucide.createIcons();

        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const arrowIcon = document.getElementById('arrowIcon');
        const usernameInput = document.getElementById('username');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        // Feedback sur le formulaire de connexion
        loginForm.addEventListener('submit', (e) => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Validation côté client
            if (!username) {
                e.preventDefault();
                usernameInput.focus();
                usernameInput.style.borderColor = '#dc2626';
                usernameInput.style.boxShadow = '0 0 0 4px rgba(220, 38, 38, 0.1)';
                setTimeout(() => {
                    usernameInput.style.borderColor = '';
                    usernameInput.style.boxShadow = '';
                }, 3000);
                return;
            }

            if (!password) {
                e.preventDefault();
                passwordInput.focus();
                passwordInput.style.borderColor = '#dc2626';
                passwordInput.style.boxShadow = '0 0 0 4px rgba(220, 38, 38, 0.1)';
                setTimeout(() => {
                    passwordInput.style.borderColor = '';
                    passwordInput.style.boxShadow = '';
                }, 3000);
                return;
            }

            // Afficher le loader
            btnText.textContent = "Connexion en cours...";
            loader.style.display = "block";
            arrowIcon.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.8";
            submitBtn.style.cursor = "not-allowed";
        });

        // Amélioration des messages d'erreur
        const messages = document.querySelectorAll('.messages li');
        messages.forEach((msg, index) => {
            // Ajouter une animation de shake pour les erreurs
            if (msg.classList.contains('error')) {
                msg.style.animation = 'shake 0.5s ease-out, slideDown 0.4s ease-out, slideOut 0.4s ease-out 4.6s forwards';
                // Focus sur le formulaire si erreur
                if (loginForm && loginForm.getBoundingClientRect) {
                    const rect = loginForm.getBoundingClientRect();
                    if (rect.top < 0) {
                        loginForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }

            // Auto-remove messages après 5 secondes
            setTimeout(() => {
                msg.style.animation = 'slideOut 0.4s ease-out forwards';
                setTimeout(() => msg.remove(), 400);
            }, 4600 + index * 100);
        });

        // Ajouter animation shaking pour les erreurs
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // Réinitialiser le bouton si la page est rechargée (au cas où)
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                btnText.textContent = "Se connecter";
                loader.style.display = "none";
                arrowIcon.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";
            }
        });
    </script>
</body>
</html>
